<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud IP Camera Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121214; color: #ffffff; text-align: center; margin: 0; padding: 20px; }
        .card { max-width: 500px; margin: 20px auto; background: #1a1a24; padding: 30px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        h1 { color: #00ecb3; font-size: 24px; margin-bottom: 5px; }
        button { background: #00ecb3; color: #121214; border: none; padding: 15px 20px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 10px 0; width: 100%; }
        button.btn-viewer { background: #38ef7d; }
        input { width: 100%; padding: 15px; box-sizing: border-box; background: #262636; border: 2px solid #3b3b4f; border-radius: 8px; color: #fff; font-size: 16px; margin: 10px 0; text-align: center; }
        
        .video-box { background: #000; border-radius: 10px; overflow: hidden; margin-top: 20px; border: 2px solid #00ecb3; display: none; }
        /* Box khusus untuk preview di HP */
        .preview-box { border-color: #ff4757; } 
        
        video { width: 100%; height: auto; display: block; background: #000; }
        .id-badge { background: #262636; padding: 15px; border-radius: 8px; font-weight: bold; color: #00ecb3; font-size: 20px; margin: 15px 0; border: 1px dashed #00ecb3; }
        #statusLog { background: #262636; color: #ffcc00; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 14px; display: none; font-family: monospace; word-wrap: break-word; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="mainTitle">🌐 CLOUD IP CAMERA</h1>
        <div id="statusLog">Status: Siap</div>
        
        <div id="menu">
            <button onclick="initCamera()">📷 JADIKAN HP INI KAMERA</button>
            <div style="margin: 20px 0; color: #555;">— ATAU —</div>
            <input type="text" id="targetId" placeholder="Masukkan ID Kamera">
            <button class="btn-viewer" onclick="initViewer()">📺 MULAI MENONTON</button>
        </div>

        <!-- TAMPILAN JIKA JADI KAMERA (HP) -->
        <div id="cameraSection" style="display:none;">
            <p>Masukkan ID ini di Laptop Anda:</p>
            <div class="id-badge" id="myId">Membuat ID...</div>
            <p style="color: #ff4757; font-size: 12px; margin-bottom:10px;">⚠️ Preview Aktif. Jangan tutup layar ini.</p>
            
            <!-- Video ini berfungsi ganda: sebagai preview angle & menjaga sistem HP tetap menyala -->
            <div class="video-box preview-box" style="display:block;">
                <video id="localVideo" autoplay playsinline muted></video>
            </div>
        </div>

        <!-- TAMPILAN JIKA JADI PENONTON (LAPTOP) -->
        <div id="videoSection" class="video-box">
            <video id="remoteVideo" autoplay playsinline controls muted></video>
        </div>
    </div>

    <script>
        let peer;
        let localStream;

        const peerConfig = {
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        };

        function logStatus(pesan) {
            const logBox = document.getElementById('statusLog');
            logBox.style.display = 'block';
            logBox.innerText = "Status: " + pesan;
            console.log("Status:", pesan);
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const autoViewId = urlParams.get('view');
            
            if (autoViewId) {
                document.getElementById('menu').style.display = 'none';
                document.getElementById('mainTitle').style.display = 'none';
                document.getElementById('targetId').value = autoViewId;
                logStatus("Memicu koneksi otomatis...");
                setTimeout(() => { initViewer(); }, 1000);
            }
        };

        async function initCamera() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('cameraSection').style.display = 'block';
            logStatus("Meminta izin kamera...");

            try {
                // Minta akses kamera belakang
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: true 
                });
                
                // Tampilkan video di layar HP agar bisa "dikontrol" angle-nya
                document.getElementById('localVideo').srcObject = localStream;
                logStatus("Kamera menyala. Membuat server...");

                peer = new Peer(null, peerConfig);
                
                peer.on('open', (id) => {
                    document.getElementById('myId').innerText = id;
                    logStatus("Kamera standby. Menunggu Laptop...");
                });

                peer.on('connection', (conn) => {
                    logStatus("Laptop mencoba menyambung...");
                    
                    conn.on('open', () => {
                        logStatus("Jalur data terhubung!");
                    });

                    conn.on('data', (data) => {
                        if(data === 'minta_video') {
                            logStatus("Permintaan diterima. Mengirim video...");
                            peer.call(conn.peer, localStream);
                        }
                    });
                });

                peer.on('error', (err) => {
                    logStatus("Error Peer: " + err.type);
                });

            } catch (err) {
                logStatus("Akses Ditolak: " + err.message);
                alert("Gagal. Pastikan Anda memberi izin kamera!");
            }
        }

        function initViewer() {
            const targetId = document.getElementById('targetId').value.trim();
            if(!targetId) return alert("Masukkan ID Kamera!");
            
            document.getElementById('menu').style.display = 'none';
            logStatus("Mempersiapkan jaringan...");
            
            peer = new Peer(null, peerConfig);

            peer.on('open', () => {
                logStatus("Mengetuk pintu ID: " + targetId);
                // reliable: true memastikan perintah tidak hilang di jalan
                const conn = peer.connect(targetId, { reliable: true });
                
                conn.on('open', () => {
                    logStatus("Pintu terbuka! Meminta video...");
                    conn.send('minta_video');
                });
            });

            peer.on('call', (call) => {
                logStatus("Menerima panggilan video...");
                call.answer(); // Jawab tanpa mengirim video balik
                
                call.on('stream', (remoteStream) => {
                    logStatus("KONEKSI SUKSES!");
                    setTimeout(() => { document.getElementById('statusLog').style.display = 'none'; }, 2000);
                    
                    document.getElementById('videoSection').style.display = 'block';
                    const video = document.getElementById('remoteVideo');
                    video.srcObject = remoteStream;
                });
            });

            peer.on('error', (err) => {
                logStatus("Koneksi Gagal: " + err.type);
                alert("Gagal terhubung. Pastikan Kamera HP masih menyala dan ID benar.");
            });
        }
    </script>
</body>
</html>
