<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud IP Camera Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121214; color: #ffffff; text-align: center; margin: 0; padding: 20px; }
        .card { max-width: 500px; margin: 20px auto; background: #1a1a24; padding: 30px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        h1 { color: #00ecb3; font-size: 24px; margin-bottom: 5px; }
        
        button { background: #00ecb3; color: #121214; border: none; padding: 15px 20px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 10px 0; width: 100%; }
        button.btn-viewer { background: #38ef7d; }
        button.btn-qr { background: #ff9f43; color: #fff; }
        /* Tombol khusus rotasi */
        button.btn-rotate { background: #546de5; color: #fff; padding: 10px 15px; font-size: 14px; width: auto; display: inline-block; margin-top: 15px; }
        
        input { width: 100%; padding: 15px; box-sizing: border-box; background: #262636; border: 2px solid #3b3b4f; border-radius: 8px; color: #fff; font-size: 16px; margin: 10px 0; text-align: center; }
        
        .video-box { background: #000; border-radius: 10px; overflow: hidden; margin-top: 20px; border: 2px solid #00ecb3; display: none; position: relative; }
        .preview-box { border-color: #ff4757; } 
        
        /* Efek transisi halus saat video diputar */
        video { width: 100%; height: auto; display: block; background: #000; transition: transform 0.3s ease; }
        
        .id-badge { background: #262636; padding: 15px; border-radius: 8px; font-weight: bold; color: #00ecb3; font-size: 20px; margin: 15px 0; border: 1px dashed #00ecb3; }
        #statusLog { background: #262636; color: #ffcc00; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 14px; display: none; font-family: monospace; word-wrap: break-word; }
        #qrcode-container { margin: 20px auto; padding: 15px; background: white; display: inline-block; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="mainTitle">🌐 CLOUD IP CAMERA</h1>
        <div id="statusLog">Status: Siap</div>
        
        <!-- MENU UTAMA -->
        <div id="menu">
            <button class="btn-qr" onclick="initMonitorQR()">💻 BUKA DI LAPTOP (TAMPILKAN BARKODE)</button>
            <div style="margin: 20px 0; color: #555;">— ATAU CARA MANUAL —</div>
            <button onclick="initCamera()">📷 JADIKAN HP KAMERA</button>
            <input type="text" id="targetId" placeholder="Masukkan ID Kamera">
            <button class="btn-viewer" onclick="initViewer()">📺 MULAI MENONTON</button>
        </div>

        <!-- SECTION BARKODE (LAPTOP) -->
        <div id="qrSection" style="display:none;">
            <h2 style="color: #ff9f43;">SCAN BARKODE INI</h2>
            <p>Buka kamera bawaan HP Anda dan scan gambar di bawah:</p>
            <div id="qrcode-container"></div>
            <p style="color: #00ecb3; font-weight: bold;">Menunggu HP terhubung...</p>
        </div>

        <!-- SECTION KAMERA (HP) -->
        <div id="cameraSection" style="display:none;">
            <p id="kameraTeksInfo">Masukkan ID ini di Laptop Anda:</p>
            <div class="id-badge" id="myId">Membuat ID...</div>
            <p style="color: #ff4757; font-size: 12px; margin-bottom:10px;">⚠️ Preview Aktif. Jangan tutup layar ini.</p>
            
            <div class="video-box preview-box" style="display:block;">
                <video id="localVideo" autoplay playsinline muted></video>
            </div>
        </div>

        <!-- SECTION PENONTON (LAPTOP) -->
        <div id="videoSection">
            <div class="video-box" id="videoBoxWrapper" style="display:none;">
                <video id="remoteVideo" autoplay playsinline controls muted></video>
            </div>
            <!-- Tombol Rotasi Layar -->
            <button id="rotateBtn" class="btn-rotate" style="display:none;" onclick="rotateVideo()">🔄 Putar Gambar (90°)</button>
        </div>
    </div>

    <script>
        let peer;
        let localStream;
        let currentRotation = 0; // Menyimpan status derajat putaran

        const peerConfig = {
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        };

        function logStatus(pesan) {
            const logBox = document.getElementById('statusLog');
            logBox.style.display = 'block';
            logBox.innerText = "Status: " + pesan;
        }

        // --- FUNGSI ROTASI VIDEO (TIPS LAPTOP) ---
        function rotateVideo() {
            currentRotation = (currentRotation + 90) % 360;
            const video = document.getElementById('remoteVideo');
            
            // Putar video menggunakan CSS transform
            if (currentRotation === 90 || currentRotation === 270) {
                video.style.transform = `rotate(${currentRotation}deg) scale(0.75)`; // Perkecil sedikit agar tidak terpotong bingkai
                video.style.objectFit = "contain";
            } else {
                video.style.transform = `rotate(${currentRotation}deg) scale(1)`;
                video.style.objectFit = "cover";
            }
            logStatus("Rotasi Layar: " + currentRotation + "°");
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const autoSendToId = urlParams.get('scan');
            const autoViewId = urlParams.get('view');
            
            if (autoSendToId) {
                document.getElementById('menu').style.display = 'none';
                document.getElementById('mainTitle').style.display = 'none';
                logStatus("Barkode terdeteksi! Mengaktifkan kamera...");
                setTimeout(() => { initCameraAndSend(autoSendToId); }, 1000);
            } else if (autoViewId) {
                document.getElementById('menu').style.display = 'none';
                document.getElementById('targetId').value = autoViewId;
                logStatus("Memicu koneksi otomatis...");
                setTimeout(() => { initViewer(); }, 1000);
            }
        };

        function initMonitorQR() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('qrSection').style.display = 'block';
            logStatus("Membuat Barkode...");

            peer = new Peer(null, peerConfig);

            peer.on('open', (id) => {
                logStatus("Siap! Silakan scan barkode dengan kamera HP.");
                const currentUrl = window.location.href.split('?')[0]; 
                const scanLink = currentUrl + "?scan=" + id;

                new QRCode(document.getElementById("qrcode-container"), {
                    text: scanLink,
                    width: 200,
                    height: 200,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            });

            peer.on('call', (call) => {
                logStatus("Menerima video dari HP...");
                document.getElementById('qrSection').style.display = 'none';
                document.getElementById('videoBoxWrapper').style.display = 'block';
                document.getElementById('rotateBtn').style.display = 'inline-block'; // Tampilkan tombol rotasi
                
                call.answer();
                call.on('stream', (remoteStream) => {
                    logStatus("KONEKSI SUKSES!");
                    setTimeout(() => { document.getElementById('statusLog').style.display = 'none'; }, 2000);
                    document.getElementById('remoteVideo').srcObject = remoteStream;
                });
            });
        }

        async function initCameraAndSend(targetLaptopId) {
            document.getElementById('cameraSection').style.display = 'block';
            document.getElementById('myId').style.display = 'none';
            document.getElementById('kameraTeksInfo').innerText = "Streaming ke Laptop sedang berjalan...";

            try {
                // Minta resolusi HD 1280x720 (Landscape)
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: true 
                });
                
                document.getElementById('localVideo').srcObject = localStream;
                logStatus("Kamera menyala. Menyambungkan ke Laptop...");

                peer = new Peer(null, peerConfig);
                peer.on('open', (id) => {
                    peer.call(targetLaptopId, localStream);
                });

            } catch (err) {
                logStatus("Akses Ditolak: " + err.message);
                alert("Gagal akses kamera!");
            }
        }

        // --- MANUALLY RETAINED ---
        async function initCamera() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('cameraSection').style.display = 'block';
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                peer = new Peer(null, peerConfig);
                peer.on('open', (id) => { document.getElementById('myId').innerText = id; });
                peer.on('connection', (conn) => { conn.on('data', (data) => { if(data === 'minta_video') peer.call(conn.peer, localStream); }); });
            } catch (err) { alert("Gagal akses kamera!"); }
        }

        function initViewer() {
            const targetId = document.getElementById('targetId').value.trim();
            if(!targetId) return alert("Masukkan ID Kamera!");
            document.getElementById('menu').style.display = 'none';
            peer = new Peer(null, peerConfig);
            peer.on('open', () => {
                const conn = peer.connect(targetId, { reliable: true });
                conn.on('open', () => { conn.send('minta_video'); });
            });
            peer.on('call', (call) => {
                call.answer(); 
                document.getElementById('videoBoxWrapper').style.display = 'block';
                document.getElementById('rotateBtn').style.display = 'inline-block';
                call.on('stream', (remoteStream) => { document.getElementById('remoteVideo').srcObject = remoteStream; });
            });
        }
    </script>
</body>
</html>
